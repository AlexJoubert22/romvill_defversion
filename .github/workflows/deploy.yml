name: Deploy to Romvill

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build theme ZIP
        run: |
          git archive HEAD --format=zip --prefix=romvill-theme/ -o /tmp/romvill-theme.zip
          echo "ZIP size: $(du -sh /tmp/romvill-theme.zip | cut -f1)"

      - name: Deploy to WordPress
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -u "romvill:${{ secrets.WP_APP_PASS }}" \
            -F "themezip=@/tmp/romvill-theme.zip;type=application/zip" \
            "https://romvill.com/wp-json/romvill/v1/deploy")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy failed!"
            exit 1
          fi

      - name: Verify site
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://romvill.com)
          echo "Site HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Site not responding correctly!"
            exit 1
          fi
          echo "Deploy complete - romvill.com is live"

      # Purga programática: object cache + funciones de purga de Atomic +
      # endpoint oficial de purga del edge de WP.com vía token Jetpack.
      # Se ejecuta DESPUÉS del deploy para que cargue el functions.php nuevo.
      # No rompe el build si falla: imprime el diagnóstico y sigue.
      - name: Purge caches
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -u "romvill:${{ secrets.WP_APP_PASS }}" \
            "https://romvill.com/wp-json/romvill/v1/purge")
          echo "Purge response:"
          echo "$RESPONSE"

      # La caché del borde de WordPress.com sirve copias STALE unos minutos
      # tras el deploy. Visitamos cada página dos veces para que la copia
      # rancia se la coma este robot (la 1ª revalida, la 2ª ya es fresca)
      # y ningún visitante vea la versión antigua.
      - name: Warm edge cache
        run: |
          for path in "" "metodologia/" "analisis/" "sectores/" "precios/" "contacto/" "perfil-seguridad/" "perfil-demografico/" "perfil-sanidad/" "perfil-movilidad/" "perfil-proyeccion/" "privacidad/" "terminos/"; do
            curl -s -o /dev/null "https://romvill.com/$path"
            sleep 1
            curl -s -o /dev/null "https://romvill.com/$path"
          done
          echo "Edge cache warmed"
